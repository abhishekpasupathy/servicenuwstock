services:
  - type: web
    name: dadstock-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: DadStock API
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: SQLITE_PATH
        value: /tmp/dadstock.sqlite
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: MARKET_CACHE_TTL_SECONDS
        value: "1800"
      - key: MARKET_FALLBACK_CACHE_TTL_SECONDS
        value: "600"
